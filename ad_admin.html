<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - ReferHub</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0a0e27, #1a1f3a);
      color: #e5e7eb;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(10px);
      padding: 20px 40px;
      border-bottom: 1px solid rgba(34, 197, 94, 0.2);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(135deg, #22c55e, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logout-btn {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.4);
      color: #fca5a5;
      padding: 10px 20px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }

    .logout-btn:hover {
      background: rgba(239, 68, 68, 0.3);
    }

    /* Main Content */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    /* Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(34, 197, 94, 0.2);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
    }

    .stat-card .icon {
      width: 60px;
      height: 60px;
      margin: 0 auto 15px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: white;
    }

    .stat-card .label {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 8px;
    }

    .stat-card .value {
      font-size: 32px;
      font-weight: 800;
      color: #22c55e;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      border-bottom: 2px solid rgba(34, 197, 94, 0.2);
    }

    .tab {
      padding: 12px 24px;
      background: transparent;
      border: none;
      color: #94a3b8;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.3s;
    }

    .tab.active {
      color: #22c55e;
      border-bottom-color: #22c55e;
    }

    .tab:hover {
      color: #22c55e;
    }

    /* Tab Content */
    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* Payment Requests Table */
    .requests-grid {
      display: grid;
      gap: 20px;
    }

    .request-card {
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(34, 197, 94, 0.2);
      border-radius: 16px;
      padding: 24px;
      transition: all 0.3s;
    }

    .request-card:hover {
      border-color: #22c55e;
      box-shadow: 0 10px 30px rgba(34, 197, 94, 0.2);
    }

    .request-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
    }

    .user-info h3 {
      font-size: 18px;
      color: #e5e7eb;
      margin-bottom: 6px;
    }

    .user-info p {
      font-size: 14px;
      color: #94a3b8;
    }

    .status-badge {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .status-pending {
      background: rgba(251, 191, 36, 0.2);
      color: #fbbf24;
      border: 1px solid rgba(251, 191, 36, 0.4);
    }

    .status-approved {
      background: rgba(34, 197, 94, 0.2);
      color: #22c55e;
      border: 1px solid rgba(34, 197, 94, 0.4);
    }

    .status-rejected {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.4);
    }

    .request-details {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .detail-item {
      background: rgba(255, 255, 255, 0.05);
      padding: 12px;
      border-radius: 8px;
    }

    .detail-label {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 4px;
    }

    .detail-value {
      font-size: 16px;
      font-weight: 600;
      color: #e5e7eb;
    }

    .screenshot-section {
      margin: 20px 0;
    }

    .screenshot-section h4 {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 10px;
    }

    .screenshot-img {
      width: 100%;
      max-width: 400px;
      border-radius: 12px;
      border: 2px solid rgba(34, 197, 94, 0.2);
      cursor: pointer;
      transition: all 0.3s;
    }

    .screenshot-img:hover {
      border-color: #22c55e;
      transform: scale(1.02);
    }

    .action-buttons {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-approve {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
    }

    .btn-approve:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(34, 197, 94, 0.4);
    }

    .btn-reject {
      background: rgba(239, 68, 68, 0.2);
      color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, 0.4);
    }

    .btn-reject:hover {
      background: rgba(239, 68, 68, 0.3);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }

    .empty-state i {
      font-size: 64px;
      color: #374151;
      margin-bottom: 20px;
    }

    .empty-state p {
      color: #6b7280;
      font-size: 16px;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(34, 197, 94, 0.2);
      border-top-color: #22c55e;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: #0f172a;
      border-radius: 16px;
      max-width: 90%;
      max-height: 90%;
      overflow: auto;
      border: 2px solid rgba(34, 197, 94, 0.3);
    }

    .modal-content img {
      width: 100%;
      height: auto;
      display: block;
    }

    .close-modal {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(239, 68, 68, 0.9);
      color: white;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 20px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header {
        padding: 15px 20px;
      }

      .stats-grid {
        grid-template-columns: 1fr 1fr;
      }

      .request-details {
        grid-template-columns: 1fr;
      }

      .action-buttons {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <!-- Header -->
  <header class="header">
    <div class="header-content">
      <div class="brand">
        <i class="fas fa-shield-halved"></i> Admin Panel
      </div>
      <button class="logout-btn" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </div>
  </header>

  <!-- Main Container -->
  <div class="container">
    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="icon">
          <i class="fas fa-clock"></i>
        </div>
        <div class="label">Pending Requests</div>
        <div class="value" id="pendingCount">0</div>
      </div>

      <div class="stat-card">
        <div class="icon">
          <i class="fas fa-check-circle"></i>
        </div>
        <div class="label">Approved Today</div>
        <div class="value" id="approvedCount">0</div>
      </div>

      <div class="stat-card">
        <div class="icon">
          <i class="fas fa-users"></i>
        </div>
        <div class="label">Total Users</div>
        <div class="value" id="totalUsers">0</div>
      </div>

      <div class="stat-card">
        <div class="icon">
          <i class="fas fa-wallet"></i>
        </div>
        <div class="label">Total Deposits</div>
        <div class="value">Rs <span id="totalDeposits">0</span></div>
      </div>
    </div>

    <!-- Tabs -->
    <button class="tab" onclick="switchTab('withdrawals')">
  <i class="fas fa-wallet"></i> Withdrawals
</button>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('pending')">
        <i class="fas fa-clock"></i> Pending Requests
      </button>
      <button class="tab" onclick="switchTab('approved')">
        <i class="fas fa-check-circle"></i> Approved
      </button>
      <button class="tab" onclick="switchTab('rejected')">
        <i class="fas fa-times-circle"></i> Rejected
      </button>
    </div>

    <!-- Pending Requests -->
    <div id="pending-content" class="tab-content active">
      <div id="pendingRequests" class="requests-grid">
        <div class="loading">
          <div class="spinner"></div>
          <p>Loading payment requests...</p>
        </div>
      </div>
    </div>

    <!-- Approved Requests -->
    <div id="approved-content" class="tab-content">
      <div id="approvedRequests" class="requests-grid">
        <div class="loading">
          <div class="spinner"></div>
          <p>Loading approved requests...</p>
        </div>
      </div>
    </div>

    <!-- Rejected Requests -->
    <div id="rejected-content" class="tab-content">
      <div id="rejectedRequests" class="requests-grid">
        <div class="loading">
          <div class="spinner"></div>
          <p>Loading rejected requests...</p>
        </div>
      </div>
    </div>
    <div id="withdrawals-content" class="tab-content">
  <div id="withdrawalRequests" class="requests-grid">
    <div class="loading">
      <div class="spinner"></div>
      <p>Loading withdrawal requests...</p>
    </div>
  </div>
</div>

  <!-- Image Modal -->
  <div id="imageModal" class="modal" onclick="closeModal()">
    <button class="close-modal">×</button>
    <div class="modal-content" onclick="event.stopPropagation()">
      <img id="modalImage" src="" alt="Payment Screenshot">
    </div>
  </div>

  <!-- Firebase Script -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs, doc, updateDoc, setDoc, getDoc, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "YOUR_FIREBASE_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
      };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Check admin authentication
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "admin-login.html";
        return;
      }

      // Check if user is admin
      const adminEmail = "admin@referhub.com"; // Change this to your admin email
      if (user.email !== adminEmail) {
        alert("Access denied. Admin only.");
        await signOut(auth);
        window.location.href = "login.html";
        return;
      }

      loadDashboard();
    });

    // Load dashboard data
    async function loadDashboard() {
      await Promise.all([
        loadStats(),
        loadPendingRequests(),
        loadApprovedRequests(),
        loadRejectedRequests(),
        loadWithdrawalRequests()
]);

    }

    // Load statistics
    async function loadStats() {
      try {
        // Count pending requests
        const pendingQuery = query(collection(db, "payments"), where("status", "==", "pending"));
        const pendingSnap = await getDocs(pendingQuery);
        document.getElementById("pendingCount").textContent = pendingSnap.size;

        // Count approved today
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const approvedQuery = query(
          collection(db, "payments"),
          where("status", "==", "approved"),
          where("approvedAt", ">=", today.toISOString())
        );
        const approvedSnap = await getDocs(approvedQuery);
        document.getElementById("approvedCount").textContent = approvedSnap.size;

        // Count total users
        const usersSnap = await getDocs(collection(db, "users"));
        document.getElementById("totalUsers").textContent = usersSnap.size;

        // Calculate total deposits (approved payments)
        const allApprovedQuery = query(collection(db, "payments"), where("status", "==", "approved"));
        const allApprovedSnap = await getDocs(allApprovedQuery);
        let totalDeposits = 0;
        allApprovedSnap.forEach(doc => {
          totalDeposits += doc.data().amount || 0;
        });
        document.getElementById("totalDeposits").textContent = totalDeposits.toLocaleString();

      } catch (error) {
        console.error("Error loading stats:", error);
      }
    }

    // Load pending requests
    async function loadPendingRequests() {
      const container = document.getElementById("pendingRequests");
      try {
        const q = query(
          collection(db, "payments"),
          where("status", "==", "pending"),
         // orderBy("createdAt", "desc") //
        );
        const snapshot = await getDocs(q);

        if (snapshot.empty) {
          container.innerHTML = `
            <div class="empty-state">
              <i class="fas fa-inbox"></i>
              <p>No pending payment requests</p>
            </div>
          `;
          return;
        }

        container.innerHTML = "";
        snapshot.forEach(doc => {
          const data = doc.data();
          container.innerHTML += createRequestCard(doc.id, data);
        });
      } catch (error) {
        console.error("Error loading pending requests:", error);
        container.innerHTML = `<div class="empty-state"><p>Error loading requests</p></div>`;
      }
    }

    // Load approved requests
    async function loadApprovedRequests() {
      const container = document.getElementById("approvedRequests");
      try {
        const q = query(
          collection(db, "payments"),
          where("status", "==", "approved"),
          orderBy("approvedAt", "desc"),
          limit(50)
        );
        const snapshot = await getDocs(q);

        if (snapshot.empty) {
          container.innerHTML = `
            <div class="empty-state">
              <i class="fas fa-check-circle"></i>
              <p>No approved requests yet</p>
            </div>
          `;
          return;
        }

        container.innerHTML = "";
        snapshot.forEach(doc => {
          const data = doc.data();
          container.innerHTML += createRequestCard(doc.id, data);
        });
      } catch (error) {
        console.error("Error loading approved requests:", error);
        container.innerHTML = `<div class="empty-state"><p>Error loading requests</p></div>`;
      }
    }

    // Load rejected requests
    async function loadRejectedRequests() {
      const container = document.getElementById("rejectedRequests");
      try {
        const q = query(
          collection(db, "payments"),
          where("status", "==", "rejected"),
          orderBy("rejectedAt", "desc"),
          limit(50)
        );
        const snapshot = await getDocs(q);

        if (snapshot.empty) {
          container.innerHTML = `
            <div class="empty-state">
              <i class="fas fa-times-circle"></i>
              <p>No rejected requests</p>
            </div>
          `;
          return;
        }

        container.innerHTML = "";
        snapshot.forEach(doc => {
          const data = doc.data();
          container.innerHTML += createRequestCard(doc.id, data);
        });
      } catch (error) {
        console.error("Error loading rejected requests:", error);
        container.innerHTML = `<div class="empty-state"><p>Error loading requests</p></div>`;
      }
    }

    // Create request card HTML
    function createRequestCard(id, data) {
      const statusClass = `status-${data.status}`;
      const date = data.createdAt ? new Date(data.createdAt).toLocaleString() : "N/A";
      
      const actionButtons = data.status === "pending" ? `
        <div class="action-buttons">
          <button class="btn btn-approve" onclick="approvePayment('${id}')">
            <i class="fas fa-check"></i> Approve & Activate
          </button>
          <button class="btn btn-reject" onclick="rejectPayment('${id}')">
            <i class="fas fa-times"></i> Reject
          </button>
        </div>
      ` : '';

      return `
        <div class="request-card">
          <div class="request-header">
            <div class="user-info">
              <h3>${data.email || "Unknown"}</h3>
              <p>Submitted: ${date}</p>
            </div>
            <span class="status-badge ${statusClass}">${data.status}</span>
          </div>

          <div class="request-details">
            <div class="detail-item">
              <div class="detail-label">Plan Name</div>
              <div class="detail-value">${data.planName || "N/A"}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Amount</div>
              <div class="detail-value">Rs ${(data.amount || 0).toLocaleString()}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Transaction ID</div>
              <div class="detail-value">${data.transactionId || "N/A"}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Phone Number</div>
              <div class="detail-value">${data.phoneNumber || "N/A"}</div>
            </div>
          </div>

          ${data.screenshotUrl && data.screenshotUrl !== "No screenshot provided" ? `
            <div class="screenshot-section">
              <h4>Payment Screenshot</h4>
              <img src="${data.screenshotUrl}" alt="Payment Screenshot" class="screenshot-img" onclick="showImage('${data.screenshotUrl}')">
            </div>
          ` : `
            <div class="screenshot-section">
              <h4>Payment Screenshot</h4>
              <div style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); padding: 16px; border-radius: 12px; text-align: center; color: #fca5a5;">
                <i class="fas fa-image" style="font-size: 32px; margin-bottom: 8px; opacity: 0.5;"></i>
                <p style="font-size: 14px;">No screenshot provided</p>
              </div>
            </div>
          `}

          ${actionButtons}
        </div>
      `;
    }

    // Approve payment
    window.approvePayment = async function(paymentId) {
      if (!confirm("Approve this payment and activate the plan?")) return;

      try {
        const paymentRef = doc(db, "payments", paymentId);
        const paymentSnap = await getDoc(paymentRef);
        
        if (!paymentSnap.exists()) {
          alert("Payment not found!");
          return;
        }

        const paymentData = paymentSnap.data();

        // Find user by email
        const usersQuery = query(collection(db, "users"), where("email", "==", paymentData.email));
        const userSnap = await getDocs(usersQuery);

        if (userSnap.empty) {
          alert("User not found with email: " + paymentData.email);
          return;
        }

        const userDoc = userSnap.docs[0];
        const userId = userDoc.id;
        const userData = userDoc.data();

        // Update payment status
        await updateDoc(paymentRef, {
          status: "approved",
          approvedAt: new Date().toISOString(),
          approvedBy: auth.currentUser.email
        });

        // Update user balance and stats
        const newBalance = (userData.balance || 0) + paymentData.amount;
        const newTotalInvested = (userData.totalInvested || 0) + paymentData.amount;

        await updateDoc(doc(db, "users", userId), {
          balance: newBalance,
          totalInvested: newTotalInvested
        });

        // Create active plan
        const planDetails = getPlanDetails(paymentData.planName, paymentData.amount);
        await setDoc(doc(collection(db, "plans")), {
          userId: userId,
          email: paymentData.email,
          planName: paymentData.planName,
          investment: paymentData.amount,
          dailyProfit: planDetails.dailyProfit,
          totalReturn: planDetails.totalReturn,
          daysRemaining: 50,
          status: "active",
          createdAt: new Date().toISOString()
        });

        alert("Payment approved and plan activated successfully!");
        loadDashboard();

      } catch (error) {
        console.error("Error approving payment:", error);
        alert("Error: " + error.message);
      }
    };

    // Reject payment
    window.rejectPayment = async function(paymentId) {
      const reason = prompt("Enter rejection reason:");
      if (!reason) return;

      try {
        await updateDoc(doc(db, "payments", paymentId), {
          status: "rejected",
          rejectedAt: new Date().toISOString(),
          rejectedBy: auth.currentUser.email,
          rejectionReason: reason
        });

        alert("Payment rejected");
        loadDashboard();
      } catch (error) {
        console.error("Error rejecting payment:", error);
        alert("Error: " + error.message);
      }
    };

    // Get plan details helper
    function getPlanDetails(planName, amount) {
      const plans = {
        "STARTER": { dailyProfit: 180, totalReturn: 9000 },
        "BASIC": { dailyProfit: 480, totalReturn: 24000 },
        "SILVER": { dailyProfit: 1120, totalReturn: 56000 },
        "GOLD": { dailyProfit: 2600, totalReturn: 130000 },
        "PLATINUM": { dailyProfit: 5500, totalReturn: 275000 },
        "DIAMOND": { dailyProfit: 11500, totalReturn: 575000 },
        "ELITE": { dailyProfit: 24000, totalReturn: 1200000 },
        "PRO": { dailyProfit: 52000, totalReturn: 2600000 },
        "MEGA": { dailyProfit: 110000, totalReturn: 5500000 },
        "PRIME": { dailyProfit: 240000, totalReturn: 12000000 }
      };

      return plans[planName] || { dailyProfit: 0, totalReturn: 0 };
    }

    // Tab switching
    window.switchTab = function(tab) {
      // Update tab buttons
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.closest('.tab').classList.add('active');

      // Update tab content
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.getElementById(`${tab}-content`).classList.add('active');
    };

    // Image modal
    window.showImage = function(url) {
      document.getElementById('modalImage').src = url;
      document.getElementById('imageModal').classList.add('show');
    };

    window.closeModal = function() {
      document.getElementById('imageModal').classList.remove('show');
    };

    // Logout
    window.logout = async function() {
      if (confirm("Logout from admin panel?")) {
        await signOut(auth);
        window.location.href = "admin-login.html";
      }
    };
    // LOAD WITHDRAWAL REQUESTS
async function loadWithdrawalRequests() {
  const box = document.getElementById("withdrawalRequests");

  try {
    const q = query(
      collection(db, "withdrawals"),
      where("status", "==", "pending")
    );

    const snap = await getDocs(q);

    if (snap.empty) {
      box.innerHTML = `
        <div class="empty-state">
          <i class="fas fa-wallet"></i>
          <p>No withdrawal requests</p>
        </div>
      `;
      return;
    }

    box.innerHTML = "";
    snap.forEach(doc => {
      const d = doc.data();

      box.innerHTML += `
        <div class="request-card">
          <div class="request-header">
            <div class="user-info">
              <h3>${d.email}</h3>
              <p>Requested on ${new Date(d.date).toLocaleString()}</p>
            </div>
            <span class="status-badge status-pending">PENDING</span>
          </div>

          <div class="request-details">
            <div class="detail-item">
              <div class="detail-label">Amount</div>
              <div class="detail-value">Rs ${d.amount}</div>
            </div>

            <div class="detail-item">
              <div class="detail-label">Account</div>
              <div class="detail-value">${d.account}</div>
            </div>
          </div>
        </div>
      `;
    });

  } catch (e) {
    box.innerHTML = "<p>Error loading withdrawals</p>";
    console.error(e);
  }
}


  </script>
