<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rizq Digital Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0a0e27, #1a1f3a);
      overflow: hidden;
    }

    .glow-bg {
      position: absolute;
      width: 400px;
      height: 400px;
      background: #22c55e;
      filter: blur(150px);
      opacity: 0.2;
      animation: float 6s infinite alternate;
    }

    @keyframes float {
      from { transform: translateY(-40px); }
      to { transform: translateY(40px); }
    }

    .login-box {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 420px;
      padding: 40px;
      border-radius: 18px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(34, 197, 94, 0.3);
      box-shadow: 0 0 40px rgba(34, 197, 94, 0.2);
      text-align: center;
      color: #e5e7eb;
    }

    .brand-icon {
      width: 70px;
      height: 70px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      color: white;
      box-shadow: 0 10px 30px rgba(34, 197, 94, 0.4);
    }

    h2 {
      margin-bottom: 8px;
      font-size: 26px;
      background: linear-gradient(135deg, #22c55e, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 28px;
    }

    .error-message {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.4);
      color: #fca5a5;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 14px;
      text-align: left;
      display: none;
    }

    .error-message.show { display: flex; align-items: center; gap: 10px; }

    .success-message {
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.4);
      color: #86efac;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }

    .success-message.show { display: flex; align-items: center; gap: 10px; }

    .input-group {
      position: relative;
      margin-bottom: 18px;
    }

    .input-group i {
      position: absolute;
      top: 50%;
      left: 14px;
      transform: translateY(-50%);
      color: #22c55e;
      z-index: 1;
    }

    .input-group input {
      width: 100%;
      padding: 14px 14px 14px 42px;
      border-radius: 12px;
      border: 1px solid rgba(34, 197, 94, 0.3);
      background: rgba(0, 0, 0, 0.4);
      color: #e5e7eb;
      font-size: 14px;
      outline: none;
      transition: all 0.3s;
    }

    .input-group input::placeholder { color: #64748b; }

    .input-group input:focus {
      border-color: #22c55e;
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1);
    }

    .toggle-password {
      position: absolute;
      top: 50%;
      right: 14px;
      transform: translateY(-50%);
      color: #64748b;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      font-size: 14px;
    }

    .toggle-password:hover { color: #22c55e; }

    .forgot-link {
      display: block;
      text-align: right;
      color: #22c55e;
      font-size: 13px;
      text-decoration: none;
      margin-top: -10px;
      margin-bottom: 20px;
      transition: opacity 0.3s;
    }

    .forgot-link:hover { opacity: 0.8; }

    .login-btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 8px 20px rgba(34, 197, 94, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .login-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(34, 197, 94, 0.4);
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: #475569;
      font-size: 13px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
    }

    .footer-text {
      font-size: 14px;
      color: #94a3b8;
    }

    .footer-text a {
      color: #22c55e;
      text-decoration: none;
      font-weight: 600;
    }

    .footer-text a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .login-box { padding: 30px 20px; }
      h2 { font-size: 22px; }
    }
  </style>
</head>
<body>

  <div class="glow-bg"></div>

  <div class="login-box">
    <div class="brand-icon">
      <i class="fas fa-gem"></i>
    </div>
    <h2>Welcome Back</h2>
    <p class="subtitle">Login to your Rizq Digital account</p>

    <div id="errorMessage" class="error-message">
      <i class="fas fa-exclamation-circle"></i>
      <span id="errorText">Error</span>
    </div>
    <div id="successMessage" class="success-message">
      <i class="fas fa-check-circle"></i>
      <span id="successText">Success</span>
    </div>

    <form id="loginForm">
      <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="email" placeholder="Email address" required autocomplete="email">
      </div>

      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
        <button type="button" class="toggle-password" onclick="togglePass()">
          <i class="fas fa-eye" id="eyeIcon"></i>
        </button>
      </div>

      <a href="forgot-password.html" class="forgot-link">Forgot password?</a>

      <button type="submit" class="login-btn" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i>
        Login
      </button>
    </form>

    <div class="divider">or</div>

    <div class="footer-text">
      Don't have an account? <a href="register.html">Register Now</a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "YOUR_FIREBASE_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
      };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const loginBtn   = document.getElementById("loginBtn");
    const errorDiv   = document.getElementById("errorMessage");
    const errorText  = document.getElementById("errorText");
    const successDiv = document.getElementById("successMessage");
    const successText = document.getElementById("successText");

    function showError(msg) {
      errorText.textContent = msg;
      errorDiv.classList.add("show");
      successDiv.classList.remove("show");
      setTimeout(() => errorDiv.classList.remove("show"), 5000);
    }

    function showSuccess(msg) {
      successText.textContent = msg;
      successDiv.classList.add("show");
      errorDiv.classList.remove("show");
    }

    // Toggle password visibility
    window.togglePass = function() {
      const pwd = document.getElementById("password");
      const icon = document.getElementById("eyeIcon");
      if (pwd.type === "password") {
        pwd.type = "text";
        icon.classList.replace("fa-eye", "fa-eye-slash");
      } else {
        pwd.type = "password";
        icon.classList.replace("fa-eye-slash", "fa-eye");
      }
    };

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      loginBtn.disabled = true;
      loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';

      try {
        await signInWithEmailAndPassword(auth, email, password);
        showSuccess("Login successful! Redirecting...");
        setTimeout(() => { window.location.href = "dashboard.html"; }, 1200);
      } catch (err) {
        let msg = "Login failed. Please try again.";
        if (err.code === "auth/user-not-found")        msg = "No account found with this email.";
        else if (err.code === "auth/wrong-password")   msg = "Incorrect password. Please try again.";
        else if (err.code === "auth/invalid-email")    msg = "Invalid email address.";
        else if (err.code === "auth/too-many-requests") msg = "Too many failed attempts. Try again later.";
        else if (err.code === "auth/invalid-credential") msg = "Invalid email or password.";
        showError(msg);
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
      }
    });
  </script>

</body>
</html>
