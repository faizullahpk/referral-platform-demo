<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - ReferHub</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { background: linear-gradient(135deg, #0a0e27, #1a1f3a); color: #e5e7eb; min-height: 100vh; }

    .header {
      background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px);
      padding: 20px 40px; border-bottom: 1px solid rgba(34,197,94,0.2);
      position: sticky; top: 0; z-index: 100;
    }
    .header-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
    .brand { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #22c55e, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .admin-time { font-size: 12px; color: #64748b; }
    .logout-btn { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.4); color: #fca5a5; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
    .logout-btn:hover { background: rgba(239,68,68,0.3); }

    .container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 40px; }
    .stat-card { background: rgba(15,23,42,0.8); border: 1px solid rgba(34,197,94,0.2); border-radius: 16px; padding: 24px; text-align: center; }
    .stat-card .icon { width: 60px; height: 60px; margin: 0 auto 15px; background: linear-gradient(135deg, #22c55e, #16a34a); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; }
    .stat-card h3 { font-size: 32px; font-weight: 700; color: #22c55e; margin-bottom: 8px; }
    .stat-card p { color: #94a3b8; font-size: 14px; }

    /* Search bar */
    .search-bar {
      background: rgba(15,23,42,0.8); border: 1px solid rgba(34,197,94,0.2);
      border-radius: 12px; padding: 12px 16px; margin-bottom: 20px;
      display: flex; align-items: center; gap: 10px;
    }
    .search-bar input {
      background: none; border: none; outline: none; color: #e5e7eb;
      font-size: 14px; width: 100%; font-family: 'Poppins', sans-serif;
    }
    .search-bar i { color: #22c55e; }

    .tabs { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
    .tab { background: rgba(15,23,42,0.8); border: 1px solid rgba(34,197,94,0.2); color: #94a3b8; padding: 12px 24px; border-radius: 12px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
    .tab.active { background: linear-gradient(135deg, #22c55e, #16a34a); color: white; border-color: transparent; }
    .tab:hover { border-color: #22c55e; }
    .tab .badge { background: rgba(239,68,68,0.8); color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; margin-left: 6px; }

    .requests-container { display: grid; gap: 20px; }

    .request-card { background: rgba(15,23,42,0.8); border: 1px solid rgba(34,197,94,0.2); border-radius: 16px; padding: 24px; }

    .request-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 20px; }
    .user-info h3 { font-size: 18px; color: #e5e7eb; margin-bottom: 4px; }
    .user-info p  { font-size: 13px; color: #94a3b8; }

    .status-badge { padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; text-transform: uppercase; }
    .status-pending  { background: rgba(251,191,36,0.2); color: #fbbf24; border: 1px solid rgba(251,191,36,0.4); }
    .status-approved { background: rgba(34,197,94,0.2);  color: #22c55e; border: 1px solid rgba(34,197,94,0.4); }
    .status-rejected { background: rgba(239,68,68,0.2);  color: #ef4444; border: 1px solid rgba(239,68,68,0.4); }
    .status-active   { background: rgba(34,197,94,0.2);  color: #22c55e; border: 1px solid rgba(34,197,94,0.4); }

    .request-details { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .detail-item { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 8px; }
    .detail-label { font-size: 11px; color: #94a3b8; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.3px; }
    .detail-value { font-size: 14px; font-weight: 600; color: #e5e7eb; }
    .detail-value.highlight { color: #22c55e; }

    /* Date timeline strip */
    .date-strip {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
    }
    .date-chip {
      background: rgba(6,182,212,0.1); border: 1px solid rgba(6,182,212,0.25);
      border-radius: 8px; padding: 6px 12px; font-size: 11px; color: #67e8f9;
      display: flex; align-items: center; gap: 5px;
    }
    .date-chip.green { background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.25); color: #86efac; }
    .date-chip.yellow { background: rgba(251,191,36,0.1); border-color: rgba(251,191,36,0.25); color: #fde68a; }
    .date-chip.red { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.25); color: #fca5a5; }

    .screenshot-section { margin-bottom: 20px; }
    .screenshot-section h4 { font-size: 13px; color: #94a3b8; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.3px; }
    .screenshot-img { max-width: 100%; max-height: 280px; border-radius: 12px; cursor: pointer; transition: transform 0.3s; object-fit: contain; }
    .screenshot-img:hover { transform: scale(1.02); }

    .action-buttons { display: flex; gap: 12px; }
    .btn { flex: 1; padding: 12px 24px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-approve { background: linear-gradient(135deg, #22c55e, #16a34a); color: white; }
    .btn-approve:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(34,197,94,0.3); }
    .btn-reject  { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.4); color: #fca5a5; }
    .btn-reject:hover { background: rgba(239,68,68,0.3); }

    .empty-state { text-align: center; padding: 60px 20px; color: #94a3b8; }
    .empty-state i { font-size: 64px; margin-bottom: 20px; opacity: 0.5; }

    .referral-info { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); border-radius: 8px; padding: 12px; margin-top: 12px; }
    .referral-info p { font-size: 13px; color: #86efac; margin: 4px 0; }

    .plan-info-box { background: rgba(6,182,212,0.1); border: 1px solid rgba(6,182,212,0.3); border-radius: 8px; padding: 12px; margin-top: 12px; }
    .plan-info-box p { font-size: 13px; color: #67e8f9; margin: 4px 0; }

    /* User card improvements */
    .user-card-header { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
    .user-avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #22c55e, #06b6d4); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 800; color: white; flex-shrink: 0; }
    .user-meta { flex: 1; min-width: 0; }
    .user-meta h3 { font-size: 16px; color: #e5e7eb; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-meta .email { font-size: 12px; color: #94a3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-meta .joined { font-size: 11px; color: #64748b; margin-top: 3px; }

    .spinner { border: 3px solid rgba(34,197,94,0.3); border-top: 3px solid #22c55e; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 40px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* Plan progress mini-bar */
    .plan-progress { margin-top: 10px; }
    .plan-progress-bar { height: 6px; background: rgba(255,255,255,0.08); border-radius: 10px; overflow: hidden; margin-top: 4px; }
    .plan-progress-fill { height: 100%; background: linear-gradient(90deg, #22c55e, #06b6d4); border-radius: 10px; }
    .plan-progress-label { font-size: 11px; color: #64748b; margin-top: 4px; text-align: right; }

    /* Active plans per user section */
    .user-plans-section { margin-top: 14px; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 14px; }
    .user-plans-title { font-size: 12px; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 10px; }
    .mini-plan { background: rgba(34,197,94,0.06); border: 1px solid rgba(34,197,94,0.15); border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
    .mini-plan-name { font-size: 13px; font-weight: 600; color: #22c55e; }
    .mini-plan-detail { font-size: 11px; color: #94a3b8; }

    @media (max-width: 768px) {
      .header { padding: 15px 20px; }
      .container { padding: 20px 15px; }
      .action-buttons { flex-direction: column; }
      .date-strip { gap: 6px; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-content">
      <div class="brand"><i class="fas fa-shield-halved"></i> Admin Panel</div>
      <div class="header-right">
        <span class="admin-time" id="adminClock"></span>
        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </div>
    </div>
  </div>

  <div class="container">

    <div class="stats-grid">
      <div class="stat-card">
        <div class="icon"><i class="fas fa-users"></i></div>
        <h3 id="totalUsers">0</h3>
        <p>Total Users</p>
      </div>
      <div class="stat-card">
        <div class="icon"><i class="fas fa-clock"></i></div>
        <h3 id="pendingPayments">0</h3>
        <p>Pending Payments</p>
      </div>
      <div class="stat-card">
        <div class="icon"><i class="fas fa-wallet"></i></div>
        <h3 id="pendingWithdrawals">0</h3>
        <p>Pending Withdrawals</p>
      </div>
      <div class="stat-card">
        <div class="icon"><i class="fas fa-chart-line"></i></div>
        <h3>Rs <span id="totalDeposits">0</span></h3>
        <p>Total Deposits</p>
      </div>
      <div class="stat-card">
        <div class="icon" style="background:linear-gradient(135deg,#8b5cf6,#7c3aed);"><i class="fas fa-user-plus"></i></div>
        <h3 id="todayUsers">0</h3>
        <p>Joined Today</p>
      </div>
      <div class="stat-card">
        <div class="icon" style="background:linear-gradient(135deg,#06b6d4,#0284c7);"><i class="fas fa-layer-group"></i></div>
        <h3 id="activePlans">0</h3>
        <p>Active Plans</p>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('pending', this)"><i class="fas fa-clock"></i> Pending Payments <span class="badge" id="pendingBadge" style="display:none;"></span></div>
      <div class="tab" onclick="switchTab('withdrawals', this)"><i class="fas fa-wallet"></i> Withdrawals <span class="badge" id="withdrawBadge" style="display:none;"></span></div>
      <div class="tab" onclick="switchTab('approved', this)"><i class="fas fa-check"></i> Approved</div>
      <div class="tab" onclick="switchTab('rejected', this)"><i class="fas fa-times"></i> Rejected</div>
      <div class="tab" onclick="switchTab('users', this)"><i class="fas fa-users"></i> All Users</div>
      <div class="tab" onclick="switchTab('support', this)"><i class="fas fa-headset"></i> Support</div>
    </div>

    <!-- Search bar (shown only on Users tab) -->
    <div class="search-bar" id="userSearch" style="display:none;">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Search by name, email or referral code..." oninput="filterUsers()">
    </div>

    <div id="pendingRequests"    class="requests-container"></div>
    <div id="withdrawalRequests" class="requests-container" style="display:none;"></div>
    <div id="approvedRequests"   class="requests-container" style="display:none;"></div>
    <div id="rejectedRequests"   class="requests-container" style="display:none;"></div>
    <div id="usersList"          class="requests-container" style="display:none;"></div>
    <div id="supportTickets"      class="requests-container" style="display:none;"></div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import {
      getFirestore, collection, getDocs, doc, getDoc, updateDoc, setDoc, addDoc,
      query, where, orderBy, limit, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "YOUR_FIREBASE_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
      };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    // Live clock
    function updateClock() {
      document.getElementById('adminClock').textContent = new Date().toLocaleString('en-PK', {
        weekday:'short', day:'numeric', month:'short', year:'numeric',
        hour:'2-digit', minute:'2-digit', second:'2-digit'
      });
    }
    updateClock(); setInterval(updateClock, 1000);

    onAuthStateChanged(auth, (user) => {
      if (!user || user.email !== "admin@referhub.com") {
        window.location.href = "admin-login.html";
      } else {
        loadDashboard();
      }
    });

    window.logout = async function() {
      await signOut(auth);
      window.location.href = "admin-login.html";
    };

    // Cache for user plans (loaded once, reused in user cards)
    let _allUsersCache = [];

    async function loadDashboard() {
      await loadStats();
      await loadPendingRequests();
    }

    async function loadStats() {
      try {
        const today = new Date(); today.setHours(0,0,0,0);

        const usersSnap = await getDocs(collection(db, "users"));
        document.getElementById("totalUsers").textContent = usersSnap.size;

        // Count users joined today
        let todayCount = 0;
        usersSnap.forEach(d => {
          const data = d.data();
          const created = data.createdAt ? toDate(data.createdAt) : null;
          if (created && created >= today) todayCount++;
        });
        document.getElementById("todayUsers").textContent = todayCount;

        let total = 0;
        usersSnap.forEach(d => { total += (d.data().totalInvested || 0); });
        document.getElementById("totalDeposits").textContent = total.toLocaleString();

        const ppSnap = await getDocs(query(collection(db, "payments"), where("status", "==", "pending")));
        const pendingCount = ppSnap.size;
        document.getElementById("pendingPayments").textContent = pendingCount;
        const pb = document.getElementById("pendingBadge");
        if (pendingCount > 0) { pb.textContent = pendingCount; pb.style.display = 'inline'; }

        const pwSnap = await getDocs(query(collection(db, "withdrawals"), where("status", "==", "pending")));
        const wCount = pwSnap.size;
        document.getElementById("pendingWithdrawals").textContent = wCount;
        const wb = document.getElementById("withdrawBadge");
        if (wCount > 0) { wb.textContent = wCount; wb.style.display = 'inline'; }

        const plansSnap = await getDocs(query(collection(db, "plans"), where("status", "==", "active")));
        document.getElementById("activePlans").textContent = plansSnap.size;

      } catch (err) { console.error("Stats error:", err); }
    }

    window.switchTab = function(tab, el) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');

      ['pendingRequests','withdrawalRequests','approvedRequests','rejectedRequests','usersList','supportTickets']
        .forEach(id => document.getElementById(id).style.display = 'none');

      document.getElementById('userSearch').style.display = 'none';

      switch (tab) {
        case 'pending':
          document.getElementById('pendingRequests').style.display = 'grid';
          loadPendingRequests(); break;
        case 'withdrawals':
          document.getElementById('withdrawalRequests').style.display = 'grid';
          loadWithdrawalRequests(); break;
        case 'approved':
          document.getElementById('approvedRequests').style.display = 'grid';
          loadApprovedRequests(); break;
        case 'rejected':
          document.getElementById('rejectedRequests').style.display = 'grid';
          loadRejectedRequests(); break;
        case 'users':
          document.getElementById('usersList').style.display = 'grid';
          document.getElementById('userSearch').style.display = 'flex';
          loadUsersList(); break;
        case 'support':
          document.getElementById('supportTickets').style.display = 'block';
          loadSupportTickets(); break;
      }
    };

    // ── PENDING ──────────────────────────────────────────────────
    async function loadPendingRequests() {
      const container = document.getElementById("pendingRequests");
      container.innerHTML = '<div class="spinner"></div>';
      try {
        const q    = query(collection(db, "payments"), where("status", "==", "pending"), orderBy("createdAt", "desc"));
        const snap = await getDocs(q);
        if (snap.empty) { container.innerHTML = emptyState("fa-inbox", "No pending payment requests"); return; }
        container.innerHTML = "";
        for (const d of snap.docs) container.innerHTML += await createRequestCard(d.id, d.data());
      } catch (err) { console.error(err); container.innerHTML = emptyState("fa-exclamation-triangle", "Error loading requests"); }
    }

    // ── APPROVED ─────────────────────────────────────────────────
    async function loadApprovedRequests() {
      const container = document.getElementById("approvedRequests");
      container.innerHTML = '<div class="spinner"></div>';
      try {
        const q    = query(collection(db, "payments"), where("status", "==", "approved"), orderBy("approvedAt", "desc"), limit(50));
        const snap = await getDocs(q);
        if (snap.empty) { container.innerHTML = emptyState("fa-check-circle", "No approved requests yet"); return; }
        container.innerHTML = "";
        for (const d of snap.docs) container.innerHTML += await createRequestCard(d.id, d.data());
      } catch (err) { console.error(err); container.innerHTML = emptyState("fa-exclamation-triangle", "Error loading requests"); }
    }

    // ── REJECTED ─────────────────────────────────────────────────
    async function loadRejectedRequests() {
      const container = document.getElementById("rejectedRequests");
      container.innerHTML = '<div class="spinner"></div>';
      try {
        const q    = query(collection(db, "payments"), where("status", "==", "rejected"), orderBy("rejectedAt", "desc"), limit(50));
        const snap = await getDocs(q);
        if (snap.empty) { container.innerHTML = emptyState("fa-times-circle", "No rejected requests"); return; }
        container.innerHTML = "";
        for (const d of snap.docs) container.innerHTML += await createRequestCard(d.id, d.data());
      } catch (err) { console.error(err); container.innerHTML = emptyState("fa-exclamation-triangle", "Error loading requests"); }
    }

    // ── WITHDRAWALS ───────────────────────────────────────────────
    async function loadWithdrawalRequests() {
      const container = document.getElementById("withdrawalRequests");
      container.innerHTML = '<div class="spinner"></div>';
      try {
        const q    = query(collection(db, "withdrawals"), where("status", "==", "pending"));
        const snap = await getDocs(q);
        if (snap.empty) { container.innerHTML = emptyState("fa-wallet", "No pending withdrawal requests"); return; }
        container.innerHTML = "";
        snap.forEach(d => { container.innerHTML += createWithdrawalCard(d.id, d.data()); });
      } catch (err) { console.error(err); container.innerHTML = emptyState("fa-exclamation-triangle", "Error loading withdrawals"); }
    }

    // ── USERS LIST ────────────────────────────────────────────────
    let _allUserCards = []; // store rendered cards for search filtering

    async function loadUsersList() {
      const container = document.getElementById("usersList");
      container.innerHTML = '<div class="spinner"></div>';
      _allUserCards = [];
      try {
        const usersSnap  = await getDocs(collection(db, "users"));
        const plansSnap  = await getDocs(collection(db, "plans"));

        // Build map: userId → array of plans
        const plansMap = {};
        plansSnap.forEach(d => {
          const p = d.data();
          if (!plansMap[p.userId]) plansMap[p.userId] = [];
          plansMap[p.userId].push(p);
        });

        if (usersSnap.empty) { container.innerHTML = emptyState("fa-users", "No users found"); return; }

        // Sort: newest join first
        const userDocs = [];
        usersSnap.forEach(d => userDocs.push({ id: d.id, ...d.data() }));
        userDocs.sort((a, b) => toDate(b.createdAt) - toDate(a.createdAt));

        container.innerHTML = "";
        userDocs.forEach(data => {
          const plans = plansMap[data.uid || data.id] || [];
          const card  = createUserCard(data.id, data, plans);
          _allUserCards.push({ html: card, name: (data.username || '').toLowerCase(), email: (data.email || '').toLowerCase(), ref: (data.referralCode || '').toLowerCase() });
          container.innerHTML += card;
        });
      } catch (err) { console.error(err); container.innerHTML = emptyState("fa-exclamation-triangle", "Error loading users"); }
    }

    // User search filter
    window.filterUsers = function() {
      const q = document.getElementById('searchInput').value.toLowerCase().trim();
      const container = document.getElementById("usersList");
      if (!q) {
        container.innerHTML = _allUserCards.map(c => c.html).join('');
        return;
      }
      const filtered = _allUserCards.filter(c => c.name.includes(q) || c.email.includes(q) || c.ref.includes(q));
      container.innerHTML = filtered.length
        ? filtered.map(c => c.html).join('')
        : emptyState("fa-search", "No users match your search");
    };

    function emptyState(icon, text) {
      return `<div class="empty-state"><i class="fas ${icon}"></i><p>${text}</p></div>`;
    }

    // ── REQUEST CARD (Payments) ────────────────────────────────────
    async function createRequestCard(id, data) {
      const statusClass = `status-${data.status}`;

      // ── Date chips ──
      const submittedDate = data.createdAt   ? fmtDateTime(data.createdAt)   : null;
      const approvedDate  = data.approvedAt  ? fmtDateTime(data.approvedAt)  : null;
      const rejectedDate  = data.rejectedAt  ? fmtDateTime(data.rejectedAt)  : null;

      let dateChips = '';
      if (submittedDate) dateChips += `<div class="date-chip"><i class="fas fa-calendar-plus"></i> Submitted: ${submittedDate}</div>`;
      if (approvedDate)  dateChips += `<div class="date-chip green"><i class="fas fa-check-circle"></i> Approved: ${approvedDate}</div>`;
      if (rejectedDate)  dateChips += `<div class="date-chip red"><i class="fas fa-times-circle"></i> Rejected: ${rejectedDate}</div>`;

      // Calculate plan end date if approved
      let planEndDate = '';
      if (data.status === 'approved' && approvedDate) {
        const plan = getPlanDetails(data.planName, data.amount);
        const end  = new Date(toDate(data.approvedAt));
        end.setDate(end.getDate() + plan.duration);
        planEndDate = `<div class="date-chip yellow"><i class="fas fa-flag-checkered"></i> Plan ends: ${end.toLocaleDateString('en-PK', { day:'numeric', month:'short', year:'numeric' })}</div>`;
      }

      // ── Referral info ──
      let referralInfo = '';
      try {
        const uq    = query(collection(db, "users"), where("email", "==", data.email));
        const uSnap = await getDocs(uq);
        if (!uSnap.empty) {
          const ud = uSnap.docs[0].data();
          if (ud.referredBy) {
            const refSnap = await getDoc(doc(db, "users", ud.referredBy));
            if (refSnap.exists()) {
              const rd         = refSnap.data();
              const commission = (data.amount * 0.02).toFixed(2);
              referralInfo = `
                <div class="referral-info">
                  <p><i class="fas fa-user-friends"></i> <strong>Referred By:</strong> ${rd.username || rd.email} (${rd.email})</p>
                  <p><i class="fas fa-percentage"></i> <strong>2% Commission:</strong> Rs ${parseFloat(commission).toLocaleString()}</p>
                  <p style="font-size:11px;opacity:0.8;"><i class="fas fa-info-circle"></i> Commission credited to referrer upon approval</p>
                </div>`;
            }
          }
        }
      } catch {}

      // ── Plan preview ──
      const plan = getPlanDetails(data.planName, data.amount);
      const planInfoHtml = data.status === "pending" ? `
        <div class="plan-info-box">
          <p><i class="fas fa-chart-bar"></i> <strong>Plan:</strong> ${data.planName} &nbsp;|&nbsp; Duration: ${plan.duration} days</p>
          <p><i class="fas fa-coins"></i> <strong>Daily Profit:</strong> Rs ${plan.dailyProfit.toLocaleString()} &nbsp;|&nbsp; Total Return: Rs ${plan.totalReturn.toLocaleString()}</p>
        </div>` : '';

      const actionButtons = data.status === "pending" ? `
        <div class="action-buttons">
          <button class="btn btn-approve" onclick="approvePayment('${id}')"><i class="fas fa-check"></i> Approve & Activate</button>
          <button class="btn btn-reject"  onclick="rejectPayment('${id}')"><i class="fas fa-times"></i> Reject</button>
        </div>` : '';

      return `
        <div class="request-card">
          <div class="request-header">
            <div class="user-info">
              <h3><i class="fas fa-envelope" style="font-size:14px;color:#22c55e;margin-right:6px;"></i>${data.email || "Unknown"}</h3>
              <p>Payment ID: ${id.slice(0,10).toUpperCase()}</p>
            </div>
            <span class="status-badge ${statusClass}">${data.status}</span>
          </div>

          ${dateChips || planEndDate ? `<div class="date-strip">${dateChips}${planEndDate}</div>` : ''}

          <div class="request-details">
            <div class="detail-item"><div class="detail-label">Plan Name</div><div class="detail-value highlight">${data.planName || "N/A"}</div></div>
            <div class="detail-item"><div class="detail-label">Amount</div><div class="detail-value">Rs ${(data.amount || 0).toLocaleString()}</div></div>
            <div class="detail-item"><div class="detail-label">Transaction ID</div><div class="detail-value">${data.transactionId || "N/A"}</div></div>
            <div class="detail-item"><div class="detail-label">Phone Number</div><div class="detail-value">${data.phoneNumber || "N/A"}</div></div>
            ${data.approvedBy  ? `<div class="detail-item"><div class="detail-label">Approved By</div><div class="detail-value">${data.approvedBy}</div></div>` : ''}
            ${data.rejectedBy  ? `<div class="detail-item"><div class="detail-label">Rejected By</div><div class="detail-value">${data.rejectedBy}</div></div>` : ''}
            ${data.rejectionReason ? `<div class="detail-item"><div class="detail-label">Rejection Reason</div><div class="detail-value" style="color:#ef4444;">${data.rejectionReason}</div></div>` : ''}
          </div>

          ${referralInfo}
          ${planInfoHtml}

          ${data.screenshotUrl && data.screenshotUrl !== "No screenshot provided"
            ? `<div class="screenshot-section"><h4><i class="fas fa-image"></i> Payment Screenshot</h4><img src="${data.screenshotUrl}" alt="Payment Screenshot" class="screenshot-img" onclick="window.open('${data.screenshotUrl}','_blank')"></div>`
            : `<div class="screenshot-section"><h4><i class="fas fa-image"></i> Payment Screenshot</h4><div style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);padding:16px;border-radius:12px;text-align:center;color:#fca5a5;"><i class="fas fa-image" style="font-size:32px;margin-bottom:8px;opacity:0.5;display:block;"></i><p style="font-size:14px;">No screenshot provided</p></div></div>`
          }

          ${actionButtons}
        </div>`;
    }

    // ── WITHDRAWAL CARD ────────────────────────────────────────────
    function createWithdrawalCard(id, data) {
      const submittedDate  = data.date        ? fmtDateTime(data.date)        : 'N/A';
      const processedDate  = data.processedAt ? fmtDateTime(data.processedAt) : null;

      return `
        <div class="request-card">
          <div class="request-header">
            <div class="user-info">
              <h3><i class="fas fa-envelope" style="font-size:14px;color:#22c55e;margin-right:6px;"></i>${data.email || "Unknown"}</h3>
              <p>Withdrawal ID: ${id.slice(0,10).toUpperCase()}</p>
            </div>
            <span class="status-badge status-pending">PENDING</span>
          </div>

          <div class="date-strip">
            <div class="date-chip"><i class="fas fa-calendar-plus"></i> Requested: ${submittedDate}</div>
            ${processedDate ? `<div class="date-chip green"><i class="fas fa-check-circle"></i> Processed: ${processedDate}</div>` : ''}
          </div>

          <div class="request-details">
            <div class="detail-item"><div class="detail-label">Withdrawal Amount</div><div class="detail-value highlight">Rs ${(data.amount || 0).toLocaleString()}</div></div>
            <div class="detail-item"><div class="detail-label">JazzCash Account</div><div class="detail-value">${data.account || "N/A"}</div></div>
            <div class="detail-item"><div class="detail-label">User Email</div><div class="detail-value">${data.email || "N/A"}</div></div>
            <div class="detail-item"><div class="detail-label">User ID</div><div class="detail-value" style="font-size:11px;word-break:break-all;">${data.userId || "N/A"}</div></div>
          </div>

          <div class="action-buttons">
            <button class="btn btn-approve" onclick="approveWithdrawal('${id}','${data.userId}',${data.amount},'${data.email}')"><i class="fas fa-check"></i> Accept & Send Money</button>
            <button class="btn btn-reject"  onclick="rejectWithdrawal('${id}','${data.userId}',${data.amount})"><i class="fas fa-times"></i> Reject</button>
          </div>
        </div>`;
    }

    // ── USER CARD (improved with joining date + active plans) ──────
    function createUserCard(id, data, plans) {
      const joinedDate   = data.createdAt ? fmtDate(data.createdAt) : 'N/A';
      const joinedTime   = data.createdAt ? fmtDateTime(data.createdAt) : 'N/A';
      const initial      = (data.username || data.email || 'U').charAt(0).toUpperCase();
      const activePlans  = plans.filter(p => p.status === 'active');
      const completedPlans = plans.filter(p => p.status === 'completed');

      // Days since joining
      const daysSince = data.createdAt
        ? Math.floor((Date.now() - toDate(data.createdAt)) / 86400000)
        : '?';

      // Plans HTML
      let plansHtml = '';
      if (activePlans.length > 0) {
        plansHtml = `<div class="user-plans-section">
          <div class="user-plans-title"><i class="fas fa-briefcase" style="color:#22c55e;margin-right:5px;"></i> Active Plans (${activePlans.length})</div>`;
        activePlans.forEach(p => {
          const total    = p.daysTotal || 30;
          const done     = total - (p.daysRemaining || 0);
          const pct      = Math.min((done / total) * 100, 100);
          const started  = p.createdAt ? fmtDate(p.createdAt) : 'N/A';
          const end      = p.createdAt ? (() => { const d = new Date(toDate(p.createdAt)); d.setDate(d.getDate() + total); return fmtDate(d.toISOString()); })() : 'N/A';
          plansHtml += `
            <div class="mini-plan">
              <div>
                <div class="mini-plan-name">${p.planName}</div>
                <div class="mini-plan-detail">Rs ${(p.investment||0).toLocaleString()} invested · Rs ${(p.dailyProfit||0).toLocaleString()}/day</div>
                <div class="mini-plan-detail" style="margin-top:2px;">Started: ${started} &nbsp;→&nbsp; Ends: ${end}</div>
                <div class="plan-progress">
                  <div class="plan-progress-bar"><div class="plan-progress-fill" style="width:${pct}%"></div></div>
                  <div class="plan-progress-label">${done}/${total} days · ${Math.round(pct)}%</div>
                </div>
              </div>
              <div style="text-align:right;flex-shrink:0;margin-left:12px;">
                <div style="font-size:11px;color:#22c55e;font-weight:700;">${p.daysRemaining || 0} days left</div>
              </div>
            </div>`;
        });
        plansHtml += '</div>';
      }

      return `
        <div class="request-card" data-uid="${id}">
          <div class="user-card-header">
            <div class="user-avatar">${initial}</div>
            <div class="user-meta">
              <h3>${data.username || "Unknown"}</h3>
              <div class="email">${data.email || "No email"}</div>
              <div class="joined"><i class="fas fa-calendar-check" style="color:#22c55e;margin-right:4px;"></i>Joined: ${joinedDate} (${daysSince} days ago)</div>
            </div>
            <span class="status-badge status-${data.accountStatus || 'active'}">${data.accountStatus || 'active'}</span>
          </div>

          <div class="date-strip">
            <div class="date-chip"><i class="fas fa-clock"></i> Joined: ${joinedTime}</div>
            ${activePlans.length > 0 ? `<div class="date-chip green"><i class="fas fa-briefcase"></i> ${activePlans.length} active plan${activePlans.length !== 1 ? 's' : ''}</div>` : ''}
            ${completedPlans.length > 0 ? `<div class="date-chip yellow"><i class="fas fa-flag-checkered"></i> ${completedPlans.length} completed</div>` : ''}
          </div>

          <div class="request-details">
            <div class="detail-item"><div class="detail-label">Balance</div><div class="detail-value highlight">Rs ${(data.balance||0).toLocaleString()}</div></div>
            <div class="detail-item"><div class="detail-label">Total Invested</div><div class="detail-value">Rs ${(data.totalInvested||0).toLocaleString()}</div></div>
            <div class="detail-item"><div class="detail-label">Daily Profit</div><div class="detail-value">Rs ${(data.dailyProfit||0).toLocaleString()}</div></div>
            <div class="detail-item"><div class="detail-label">Total Earned</div><div class="detail-value">Rs ${(data.totalEarned||0).toLocaleString()}</div></div>
            <div class="detail-item"><div class="detail-label">Total Withdrawn</div><div class="detail-value">Rs ${(data.totalWithdrawn||0).toLocaleString()}</div></div>
            <div class="detail-item"><div class="detail-label">Phone</div><div class="detail-value">${data.phone || "N/A"}</div></div>
            <div class="detail-item"><div class="detail-label">Referral Code</div><div class="detail-value highlight">${data.referralCode || "N/A"}</div></div>
            <div class="detail-item"><div class="detail-label">Package Level</div><div class="detail-value">Level ${data.packageLevel || 0}</div></div>
            <div class="detail-item"><div class="detail-label">Team Size</div><div class="detail-value">${data.totalTeam || 0} members</div></div>
            <div class="detail-item"><div class="detail-label">Active Team</div><div class="detail-value">${data.activeTeam || 0} members</div></div>
            <div class="detail-item"><div class="detail-label">Referral Earnings</div><div class="detail-value">Rs ${(data.teamBonus||0).toLocaleString()}</div></div>
            <div class="detail-item"><div class="detail-label">JazzCash No.</div><div class="detail-value">${data.jazzCashNumber || data.phone || "N/A"}</div></div>
          </div>

          ${plansHtml}
        </div>`;
    }

    // ── PLAN DETAILS MAP ─────────────────────────────────────────
    function getPlanDetails(planName, amount) {
      const plans = {
        'STARTER': { dailyProfit: 50,  totalReturn: 750,   duration: 15 },
        'A1': { dailyProfit: 21,  totalReturn: 1150,  duration: 7  },
        'A2': { dailyProfit: 71,  totalReturn: 3500,  duration: 7  },
        'A3': { dailyProfit: 129, totalReturn: 5900,  duration: 7  },
        'B1': { dailyProfit: 40,  totalReturn: 3600,  duration: 15 },
        'B2': { dailyProfit: 80,  totalReturn: 6200,  duration: 15 },
        'B3': { dailyProfit: 167, totalReturn: 12500, duration: 15 },
        'B4': { dailyProfit: 367, totalReturn: 25500, duration: 15 },
        'C1': { dailyProfit: 50,  totalReturn: 6500,  duration: 30 },
        'C2': { dailyProfit: 117, totalReturn: 13500, duration: 30 },
        'C3': { dailyProfit: 183, totalReturn: 20500, duration: 30 },
        'C4': { dailyProfit: 250, totalReturn: 27000, duration: 30 },
        'C5': { dailyProfit: 333, totalReturn: 35500, duration: 30 },
        'C6': { dailyProfit: 433, totalReturn: 43500, duration: 30 },
        'C7': { dailyProfit: 667, totalReturn: 65000, duration: 30 },
        'C8': { dailyProfit: 900, totalReturn: 82000, duration: 30 },
      };
      return plans[planName] || { dailyProfit: 0, totalReturn: amount, duration: 30 };
    }

    // ── APPROVE PAYMENT ──────────────────────────────────────────
    window.approvePayment = async function(paymentId) {
      if (!confirm("Approve this payment and activate the plan?")) return;
      try {
        const paymentRef  = doc(db, "payments", paymentId);
        const paymentSnap = await getDoc(paymentRef);
        if (!paymentSnap.exists()) { alert("Payment not found!"); return; }
        const paymentData = paymentSnap.data();

        let userId, userData;
        if (paymentData.userId) {
          const userSnap = await getDoc(doc(db, "users", paymentData.userId));
          if (!userSnap.exists()) { alert("User not found for ID: " + paymentData.userId); return; }
          userId = paymentData.userId; userData = userSnap.data();
        } else {
          const uq    = query(collection(db, "users"), where("email", "==", paymentData.email));
          const uSnap = await getDocs(uq);
          if (uSnap.empty) { alert("User not found: " + paymentData.email); return; }
          userId = uSnap.docs[0].id; userData = uSnap.docs[0].data();
        }

        const plan = getPlanDetails(paymentData.planName, paymentData.amount);

        await updateDoc(paymentRef, {
          status: "approved", approvedAt: new Date().toISOString(),
          approvedBy: auth.currentUser.email, userId
        });

        const firstDayProfit = plan.dailyProfit;
        const userUpdates = {
          totalInvested: (userData.totalInvested || 0) + paymentData.amount,
          dailyProfit:   (userData.dailyProfit   || 0) + plan.dailyProfit,
          balance:       (userData.balance       || 0) + firstDayProfit,
          totalEarned:   (userData.totalEarned   || 0) + firstDayProfit,
        };

        if (paymentData.planName === 'STARTER' && (userData.packageLevel || 0) === 0) {
          userUpdates.packageLevel   = 1;
          userUpdates.currentPackage = 'STARTER';
        }

        await updateDoc(doc(db, "users", userId), userUpdates);

        // 2% Referral Commission
        if (userData.referredBy) {
          try {
            const refRef  = doc(db, "users", userData.referredBy);
            const refSnap = await getDoc(refRef);
            if (refSnap.exists()) {
              const rd         = refSnap.data();
              const commission = paymentData.amount * 0.02;
              const isFirstDeposit = (userData.totalInvested || 0) === 0;
              const referrerUpdates = {
                balance:     (rd.balance     || 0) + commission,
                teamBonus:   (rd.teamBonus   || 0) + commission,
                totalEarned: (rd.totalEarned || 0) + commission
              };
              if (isFirstDeposit) referrerUpdates.activeTeam = (rd.activeTeam || 0) + 1;
              await updateDoc(refRef, referrerUpdates);
              await addDoc(collection(db, "commissions"), {
                referrerId: userData.referredBy, referredUserId: userId,
                depositAmount: paymentData.amount, commissionAmount: commission,
                commissionRate: "2%", referredUserEmail: paymentData.email,
                referrerEmail: rd.email, paymentId,
                createdAt: serverTimestamp(), status: "paid"
              });
            }
          } catch (err) { console.error("Commission error:", err); }
        }

        const _today = new Date();
        const _todayStr = `${_today.getFullYear()}-${String(_today.getMonth()+1).padStart(2,'0')}-${String(_today.getDate()).padStart(2,'0')}`;

        await addDoc(collection(db, "plans"), {
          userId, email: paymentData.email, planName: paymentData.planName,
          investment: paymentData.amount, dailyProfit: plan.dailyProfit,
          totalReturn: plan.totalReturn, daysTotal: plan.duration,
          daysRemaining: plan.duration - 1, status: "active",
          createdAt: new Date().toISOString(), lastProfitDate: _todayStr
        });

        const commissionNote = userData.referredBy ? "\n✅ 2% referral commission credited." : "";
        const levelNote      = paymentData.planName === 'STARTER' ? "\n🔓 Field A/B/C packages now unlocked." : "";
        alert(`✅ Payment approved! Plan activated.${commissionNote}${levelNote}`);
        loadDashboard();

      } catch (err) { console.error(err); alert("Error: " + err.message); }
    };

    window.rejectPayment = async function(paymentId) {
      const reason = prompt("Enter rejection reason:");
      if (!reason) return;
      try {
        await updateDoc(doc(db, "payments", paymentId), {
          status: "rejected", rejectedAt: new Date().toISOString(),
          rejectedBy: auth.currentUser.email, rejectionReason: reason
        });
        alert("❌ Payment rejected");
        loadDashboard();
      } catch (err) { alert("Error: " + err.message); }
    };

    window.approveWithdrawal = async function(withdrawalId, userId, amount, email) {
      const txId = prompt("Enter JazzCash transaction ID after sending money:");
      if (!txId) return;
      if (!confirm(`Confirm: Money sent?\nAmount: Rs ${amount.toLocaleString()}\nTx ID: ${txId}`)) return;
      try {
        await updateDoc(doc(db, "withdrawals", withdrawalId), {
          status: "approved", processedAt: new Date().toISOString(),
          processedBy: auth.currentUser.email, transactionId: txId
        });
        const userRef  = doc(db, "users", userId);
        const userSnap = await getDoc(userRef);
        if (!userSnap.exists()) { alert("User not found!"); return; }
        const ud = userSnap.data();
        await updateDoc(userRef, {
          totalWithdrawn: (ud.totalWithdrawn || 0) + amount
          // Note: balance already deducted on withdrawal submission (withdraw.html fix)
        });
        alert("✅ Withdrawal approved!");
        loadDashboard();
      } catch (err) { alert("Error: " + err.message); }
    };

    window.rejectWithdrawal = async function(withdrawalId, userId, amount) {
      const reason = prompt("Enter rejection reason:");
      if (!reason) return;
      try {
        await updateDoc(doc(db, "withdrawals", withdrawalId), {
          status: "rejected", processedAt: new Date().toISOString(),
          processedBy: auth.currentUser.email, rejectionReason: reason
        });
        // Restore balance (was deducted on submission)
        if (userId && amount) {
          const userRef  = doc(db, "users", userId);
          const userSnap = await getDoc(userRef);
          if (userSnap.exists()) {
            const ud = userSnap.data();
            await updateDoc(userRef, { balance: (ud.balance || 0) + amount });
          }
        }
        alert("❌ Withdrawal rejected. Balance restored.");
        loadDashboard();
      } catch (err) { alert("Error: " + err.message); }
    };

    // ── SUPPORT TICKETS ───────────────────────────────────────────
    async function loadSupportTickets() {
      const container = document.getElementById("supportTickets");
      container.innerHTML = '<p style="color:#94a3b8;padding:20px;">Loading tickets...</p>';
      try {
        const snap = await getDocs(query(collection(db, "support_tickets"), orderBy("createdAt", "desc")));
        if (snap.empty) {
          container.innerHTML = '<p style="color:#94a3b8;padding:20px;text-align:center;">No support tickets yet.</p>';
          return;
        }
        let html = '';
        snap.forEach(d => {
          const t    = d.data(); const tid = d.id;
          const date = t.createdAt?.toDate ? t.createdAt.toDate().toLocaleString() : (t.createdAt || 'N/A');
          const resolvedDate = t.resolvedAt?.toDate ? t.resolvedAt.toDate().toLocaleString() : null;
          const statusColor  = t.status === 'resolved' ? '#22c55e' : '#eab308';
          html += `
            <div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:16px;margin-bottom:12px;">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
                <div>
                  <span style="background:rgba(34,197,94,0.15);color:#22c55e;font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;">${t.category || 'General'}</span>
                  <span style="font-size:11px;color:#94a3b8;margin-left:8px;">Submitted: ${date}</span>
                  ${resolvedDate ? `<span style="font-size:11px;color:#22c55e;margin-left:8px;">Resolved: ${resolvedDate}</span>` : ''}
                </div>
                <span style="color:${statusColor};font-size:11px;font-weight:700;">${t.status === 'resolved' ? '✅ Resolved' : '⏳ Open'}</span>
              </div>
              <div style="font-size:12px;color:#94a3b8;margin-bottom:4px;"><i class="fas fa-envelope" style="margin-right:5px;"></i>${t.email || 'N/A'}</div>
              <div style="font-size:13px;color:#f1f5f9;margin-bottom:12px;">${t.message}</div>
              ${t.status !== 'resolved' ? `<button onclick="resolveTicket('${tid}')" style="background:linear-gradient(135deg,#22c55e,#06b6d4);border:none;border-radius:8px;padding:8px 16px;color:white;font-size:12px;font-weight:700;cursor:pointer;"><i class='fas fa-check'></i> Mark Resolved</button>` : ''}
            </div>`;
        });
        container.innerHTML = html;
      } catch (err) { container.innerHTML = `<p style="color:#ef4444;padding:20px;">Error: ${err.message}</p>`; }
    }

    window.resolveTicket = async function(ticketId) {
      try {
        await updateDoc(doc(db, "support_tickets", ticketId), {
          status: "resolved", resolvedAt: serverTimestamp(), resolvedBy: auth.currentUser.email
        });
        alert("✅ Ticket marked as resolved.");
        loadSupportTickets();
      } catch (err) { alert("Error: " + err.message); }
    };

    // ── DATE HELPERS ──────────────────────────────────────────────
    function toDate(val) {
      if (!val) return new Date(0);
      try { return val.toDate ? val.toDate() : new Date(val); }
      catch { return new Date(0); }
    }

    function fmtDate(val) {
      try {
        const d = toDate(val);
        return d.toLocaleDateString('en-PK', { day:'numeric', month:'short', year:'numeric' });
      } catch { return 'N/A'; }
    }

    function fmtDateTime(val) {
      try {
        const d = toDate(val);
        return d.toLocaleDateString('en-PK', { day:'numeric', month:'short', year:'numeric' })
             + ' ' + d.toLocaleTimeString('en-PK', { hour:'2-digit', minute:'2-digit' });
      } catch { return 'N/A'; }
    }

  </script>

</body>
</html>
