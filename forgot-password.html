<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=0">
  <title>Reset Password - ReferHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root{--accent-green:#22c55e;--accent-cyan:#06b6d4;--text-primary:#f1f5f9;--text-muted:#94a3b8;--glass-bg:rgba(255,255,255,0.05);--glass-border:rgba(255,255,255,0.1);}
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
    body{background:linear-gradient(135deg,#0a0e27 0%,#1a1f3a 50%,#0f1729 100%);color:var(--text-primary);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden;}
    body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 20% 30%,rgba(34,197,94,0.08) 0%,transparent 50%),radial-gradient(circle at 80% 70%,rgba(6,182,212,0.08) 0%,transparent 50%);z-index:0;}
    .card{position:relative;z-index:1;background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:40px 30px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.4);}
    .logo-wrap{text-align:center;margin-bottom:28px;}
    .logo{width:65px;height:65px;border-radius:50%;background:linear-gradient(135deg,var(--accent-green),var(--accent-cyan));display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:white;margin:0 auto 14px;box-shadow:0 12px 30px rgba(34,197,94,0.35);}
    .brand{font-size:22px;font-weight:800;background:linear-gradient(135deg,#22c55e,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .tagline{font-size:13px;color:var(--text-muted);margin-top:4px;}
    .form-group{margin-bottom:18px;}
    .form-label{font-size:12px;color:var(--text-muted);font-weight:600;margin-bottom:7px;display:block;text-transform:uppercase;letter-spacing:0.4px;}
    .input-wrap{position:relative;}
    .input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:15px;}
    .form-input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:13px;padding:14px 16px 14px 44px;color:var(--text-primary);font-size:14px;outline:none;transition:all 0.3s;font-family:'Poppins',sans-serif;}
    .form-input:focus{border-color:var(--accent-green);background:rgba(34,197,94,0.05);}
    .submit-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--accent-green),var(--accent-cyan));border:none;border-radius:13px;color:white;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.3s;box-shadow:0 8px 24px rgba(34,197,94,0.35);font-family:'Poppins',sans-serif;margin-top:4px;}
    .submit-btn:active{transform:scale(0.97);}
    .submit-btn:disabled{opacity:0.6;cursor:not-allowed;}
    .alert{padding:13px 16px;border-radius:12px;font-size:13px;font-weight:500;margin-bottom:16px;display:none;}
    .alert-success{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);color:var(--accent-green);}
    .alert-error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#ef4444;}
    .bottom-link{text-align:center;margin-top:20px;font-size:13px;color:var(--text-muted);}
    .bottom-link a{color:var(--accent-green);text-decoration:none;font-weight:600;}
    .info-box{background:rgba(6,182,212,0.08);border:1px solid rgba(6,182,212,0.2);border-radius:12px;padding:14px;margin-bottom:20px;font-size:12px;color:rgba(6,182,212,0.9);line-height:1.6;}
    .info-box i{margin-right:6px;}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <div class="logo">R</div>
      <div class="brand">ReferHub</div>
      <div class="tagline">Reset your password</div>
    </div>

    <div class="info-box">
      <i class="fas fa-info-circle"></i>
      Enter your registered email address. We'll send you a password reset link immediately.
    </div>

    <div id="alertBox" class="alert"></div>

    <div class="form-group">
      <label class="form-label">Email Address</label>
      <div class="input-wrap">
        <i class="input-icon fas fa-envelope"></i>
        <input type="email" class="form-input" id="emailInput" placeholder="your@email.com" autocomplete="email">
      </div>
    </div>

    <button class="submit-btn" id="resetBtn" onclick="sendReset()">
      <i class="fas fa-paper-plane"></i> Send Reset Link
    </button>

    <div class="bottom-link">
      Remembered your password? <a href="login.html">Log In</a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "YOUR_FIREBASE_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
      };
    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.sendReset = async function() {
      const email = document.getElementById("emailInput").value.trim();
      const btn   = document.getElementById("resetBtn");

      if (!email) { showAlert("error","Please enter your email address."); return; }
      if (!email.includes("@")) { showAlert("error","Please enter a valid email address."); return; }

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';

      try {
        await sendPasswordResetEmail(auth, email);
        showAlert("success","✅ Reset link sent! Check your email inbox (and spam folder). The link expires in 1 hour.");
        document.getElementById("emailInput").value = "";
      } catch (err) {
        let msg = "Failed to send reset email. Please try again.";
        if (err.code === "auth/user-not-found")    msg = "No account found with this email address.";
        if (err.code === "auth/invalid-email")     msg = "Invalid email address.";
        if (err.code === "auth/too-many-requests") msg = "Too many attempts. Please wait a few minutes and try again.";
        showAlert("error", msg);
      }

      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Reset Link';
    };

    // Allow Enter key
    document.getElementById("emailInput").addEventListener("keydown", e => {
      if (e.key === "Enter") window.sendReset();
    });

    function showAlert(type, msg) {
      const el = document.getElementById("alertBox");
      el.className = `alert alert-${type}`;
      el.textContent = msg;
      el.style.display = "block";
    }
  </script>
</body>
</html>
