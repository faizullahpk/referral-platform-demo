<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=0">
  <title>Rewards - ReferHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root{--bg-primary:#0a0e27;--bg-secondary:#141a3a;--accent-green:#22c55e;--accent-cyan:#06b6d4;--accent-purple:#8b5cf6;--text-primary:#f1f5f9;--text-muted:#94a3b8;--glass-bg:rgba(255,255,255,0.05);--glass-border:rgba(255,255,255,0.1);}
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
    body{background:linear-gradient(135deg,#0a0e27 0%,#1a1f3a 50%,#0f1729 100%);color:var(--text-primary);min-height:100vh;overflow-x:hidden;padding-bottom:100px;}
    body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 20% 30%,rgba(34,197,94,0.08) 0%,transparent 50%),radial-gradient(circle at 80% 70%,rgba(6,182,212,0.08) 0%,transparent 50%);z-index:-1;}
    .container{max-width:430px;margin:0 auto;}
    .header{background:rgba(10,14,39,0.8);backdrop-filter:blur(20px);padding:16px 20px;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--glass-border);}
    .header-top{display:flex;justify-content:space-between;align-items:center;}
    .logo-section{display:flex;align-items:center;gap:12px;}
    .logo{width:45px;height:45px;border-radius:50%;background:linear-gradient(135deg,var(--accent-green),var(--accent-cyan));display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:white;}
    .brand-name{font-size:18px;font-weight:700;background:linear-gradient(135deg,#22c55e,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .page-subtitle{font-size:12px;color:var(--text-muted);margin-top:2px;}
    .icon-btn{width:40px;height:40px;border-radius:50%;background:var(--glass-bg);border:1px solid var(--glass-border);display:flex;align-items:center;justify-content:center;color:var(--text-primary);cursor:pointer;transition:all 0.3s;text-decoration:none;}
    .icon-btn:hover{background:rgba(34,197,94,0.1);}
    .main-content{padding:20px;}

    /* Points card */
    .points-card{background:linear-gradient(135deg,#8b5cf6 0%,#7c3aed 100%);border-radius:24px;padding:24px;margin-bottom:20px;position:relative;overflow:hidden;box-shadow:0 20px 50px rgba(139,92,246,0.3);}
    .points-card::after{content:'';position:absolute;width:220px;height:220px;background:rgba(255,255,255,0.08);border-radius:50%;top:-100px;right:-60px;}
    .points-label{position:relative;z-index:2;font-size:12px;color:rgba(255,255,255,0.8);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;}
    .points-val{position:relative;z-index:2;font-size:42px;font-weight:800;color:white;margin-bottom:4px;}
    .points-sub{position:relative;z-index:2;font-size:13px;color:rgba(255,255,255,0.75);margin-bottom:20px;}
    .level-row{position:relative;z-index:2;display:flex;align-items:center;gap:10px;}
    .level-bar{flex:1;height:8px;background:rgba(255,255,255,0.2);border-radius:20px;overflow:hidden;}
    .level-fill{height:100%;background:linear-gradient(90deg,#f9fafb,rgba(255,255,255,0.6));border-radius:20px;transition:width 1s ease;}
    .level-label{font-size:12px;color:rgba(255,255,255,0.9);font-weight:700;white-space:nowrap;}

    .section{background:var(--glass-bg);backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:18px;padding:20px;margin-bottom:16px;}
    .section-title{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
    .title-icon{width:30px;height:30px;background:linear-gradient(135deg,var(--accent-green),var(--accent-cyan));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;}

    /* Milestone card */
    .milestone{display:flex;align-items:center;gap:14px;padding:14px;background:rgba(255,255,255,0.03);border:1px solid var(--glass-border);border-radius:14px;margin-bottom:10px;transition:all 0.3s;}
    .milestone:last-child{margin-bottom:0;}
    .milestone.earned{border-color:rgba(34,197,94,0.4);background:rgba(34,197,94,0.05);}
    .milestone.locked{opacity:0.5;}
    .milestone-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
    .ms-green{background:rgba(34,197,94,0.15);}
    .ms-cyan{background:rgba(6,182,212,0.15);}
    .ms-purple{background:rgba(139,92,246,0.15);}
    .ms-gold{background:rgba(234,179,8,0.15);}
    .ms-red{background:rgba(239,68,68,0.15);}
    .milestone-body{flex:1;min-width:0;}
    .milestone-name{font-size:13px;font-weight:700;}
    .milestone-desc{font-size:11px;color:var(--text-muted);margin-top:2px;}
    .milestone-progress{margin-top:6px;}
    .ms-bar{height:5px;background:rgba(255,255,255,0.08);border-radius:10px;overflow:hidden;margin-top:3px;}
    .ms-fill{height:100%;background:linear-gradient(90deg,var(--accent-green),var(--accent-cyan));border-radius:10px;}
    .ms-pct{font-size:10px;color:var(--text-muted);margin-top:2px;}
    .milestone-badge{flex-shrink:0;}
    .badge-earned{background:rgba(34,197,94,0.2);color:var(--accent-green);border:1px solid rgba(34,197,94,0.3);padding:5px 10px;border-radius:20px;font-size:10px;font-weight:700;}
    .badge-locked{background:rgba(148,163,184,0.1);color:var(--text-muted);border:1px solid var(--glass-border);padding:5px 10px;border-radius:20px;font-size:10px;font-weight:700;}

    /* Referral challenge */
    .challenge{background:rgba(255,255,255,0.03);border:1px solid var(--glass-border);border-radius:14px;padding:16px;margin-bottom:10px;}
    .challenge-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
    .challenge-title{font-size:13px;font-weight:700;}
    .challenge-reward{font-size:12px;font-weight:700;color:var(--accent-green);}
    .challenge-desc{font-size:11px;color:var(--text-muted);margin-bottom:10px;}
    .ch-bar{height:6px;background:rgba(255,255,255,0.08);border-radius:10px;overflow:hidden;}
    .ch-fill{height:100%;background:linear-gradient(90deg,var(--accent-purple),var(--accent-cyan));border-radius:10px;}
    .ch-stats{display:flex;justify-content:space-between;font-size:10px;color:var(--text-muted);margin-top:4px;}

    /* Bottom nav */
    .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(10,14,39,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--glass-border);padding:12px 20px;display:flex;justify-content:space-around;z-index:100;border-radius:24px 24px 0 0;}
    .nav-item{text-decoration:none;color:var(--text-muted);display:flex;flex-direction:column;align-items:center;gap:4px;transition:all 0.3s;padding:6px 12px;border-radius:12px;}
    .nav-item.active{color:var(--accent-green);background:rgba(34,197,94,0.1);}
    .nav-icon{font-size:20px;} .nav-label{font-size:10px;font-weight:600;}
    .spinner{border:3px solid rgba(255,255,255,0.1);border-top:3px solid var(--accent-green);border-radius:50%;width:36px;height:36px;animation:spin 1s linear infinite;margin:20px auto;}
    @keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
  </style>
</head>
<body>
  <header class="header">
    <div class="header-top">
      <div class="logo-section">
        <div class="logo">R</div>
        <div>
          <div class="brand-name">ReferHub</div>
          <div class="page-subtitle">Rewards & Milestones</div>
        </div>
      </div>
      <div style="display:flex;gap:10px;">
        <a href="dashboard.html" class="icon-btn"><i class="fas fa-arrow-left"></i></a>
        <button class="icon-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="main-content">

      <!-- Points -->
      <div class="points-card">
        <div class="points-label">Your Reward Score</div>
        <div class="points-val" id="rewardScore">0</div>
        <div class="points-sub" id="rewardLevel">Keep investing to unlock rewards</div>
        <div class="level-row">
          <div class="level-bar"><div class="level-fill" id="levelFill" style="width:0%"></div></div>
          <span class="level-label" id="nextLevelLabel">Next Level</span>
        </div>
      </div>

      <!-- Investment milestones -->
      <div class="section">
        <div class="section-title"><div class="title-icon">🏆</div>Investment Milestones</div>
        <div id="investMilestones"><div class="spinner"></div></div>
      </div>

      <!-- Team milestones -->
      <div class="section">
        <div class="section-title"><div class="title-icon">👥</div>Team Milestones</div>
        <div id="teamMilestones"><div class="spinner"></div></div>
      </div>

      <!-- Referral challenges -->
      <div class="section">
        <div class="section-title"><div class="title-icon">🎯</div>Referral Challenges</div>
        <div id="challengesContainer"><div class="spinner"></div></div>
      </div>

    </div>
  </div>

  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item"><i class="nav-icon fas fa-home"></i><span class="nav-label">Dashboard</span></a>
    <a href="plans.html" class="nav-item"><i class="nav-icon fas fa-layer-group"></i><span class="nav-label">Plans</span></a>
    <a href="my-team.html" class="nav-item"><i class="nav-icon fas fa-users"></i><span class="nav-label">My Team</span></a>
    <a href="withdraw.html" class="nav-item"><i class="nav-icon fas fa-wallet"></i><span class="nav-label">Withdraw</span></a>
  </nav>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "YOUR_FIREBASE_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
      };
    const app=initializeApp(firebaseConfig); const auth=getAuth(app); const db=getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href="login.html"; return; }
      const snap = await getDoc(doc(db,"users",user.uid));
      if (!snap.exists()) return;
      const u = snap.data();

      const invested   = u.totalInvested  || 0;
      const teamSize   = u.totalTeam      || 0;
      const teamBonus  = u.teamBonus      || 0;
      const earned     = u.totalEarned    || 0;

      // Score = invested/100 + teamSize*50 + earned/50
      const score = Math.floor(invested/100 + teamSize*50 + earned/50);
      document.getElementById("rewardScore").textContent = score.toLocaleString();

      // Level tiers
      const levels = [
        {name:"Bronze Investor", min:0,   max:500,  color:"#cd7f32"},
        {name:"Silver Investor", min:500, max:2000, color:"#94a3b8"},
        {name:"Gold Investor",   min:2000,max:5000, color:"#eab308"},
        {name:"Platinum Member", min:5000,max:10000,color:"#06b6d4"},
        {name:"Diamond Elite",   min:10000,max:99999,color:"#8b5cf6"}
      ];
      const lvl = levels.find(l => score >= l.min && score < l.max) || levels[levels.length-1];
      const nextLvl = levels[levels.indexOf(lvl)+1];
      const pct = nextLvl ? Math.min(((score-lvl.min)/(nextLvl.min-lvl.min))*100,100) : 100;
      document.getElementById("rewardLevel").textContent = lvl.name;
      document.getElementById("levelFill").style.width = pct + "%";
      document.getElementById("nextLevelLabel").textContent = nextLvl ? nextLvl.name : "Max Level 🏆";

      // Investment milestones
      const investMs = [
        {icon:"🌱",name:"First Investment",desc:"Complete your first investment plan",target:500,current:invested,cls:"ms-green"},
        {icon:"💰",name:"Rs 5,000 Invested",desc:"Reach Rs 5,000 total investment",target:5000,current:invested,cls:"ms-cyan"},
        {icon:"🚀",name:"Rs 20,000 Investor",desc:"Reach Rs 20,000 total investment",target:20000,current:invested,cls:"ms-purple"},
        {icon:"👑",name:"Rs 55,000 Elite",desc:"Reach Rs 55,000 total investment",target:55000,current:invested,cls:"ms-gold"},
      ];
      document.getElementById("investMilestones").innerHTML = renderMilestones(investMs);

      // Team milestones
      const teamMs = [
        {icon:"🤝",name:"First Referral",desc:"Invite your first team member",target:1,current:teamSize,cls:"ms-green"},
        {icon:"👨‍👩‍👧",name:"5 Member Team",desc:"Build a team of 5 members",target:5,current:teamSize,cls:"ms-cyan"},
        {icon:"🏘️",name:"20 Member Team",desc:"Grow your team to 20 members",target:20,current:teamSize,cls:"ms-purple"},
        {icon:"🌐",name:"50 Member Network",desc:"Build a network of 50 members",target:50,current:teamSize,cls:"ms-gold"},
      ];
      document.getElementById("teamMilestones").innerHTML = renderMilestones(teamMs);

      // Challenges
      const ch = [
        {title:"Invite 3 Friends This Month",reward:"Earn 500 bonus points",desc:"Invite 3 new members who complete at least one deposit",current:Math.min(teamSize,3),target:3},
        {title:"Team Earns Rs 10,000",reward:"Unlock Gold status faster",desc:"Help your team invest Rs 10,000 combined",current:Math.min(teamBonus*50,10000),target:10000},
        {title:"Reach Rs 10,000 Earnings",reward:"Diamond tier unlocked",desc:"Earn Rs 10,000 total from investments and referrals",current:Math.min(earned,10000),target:10000},
      ];
      document.getElementById("challengesContainer").innerHTML = ch.map(c => {
        const pct = Math.min((c.current/c.target)*100,100);
        return `<div class="challenge">
          <div class="challenge-header">
            <div class="challenge-title">${c.title}</div>
            <div class="challenge-reward">+${c.reward}</div>
          </div>
          <div class="challenge-desc">${c.desc}</div>
          <div class="ch-bar"><div class="ch-fill" style="width:${pct}%"></div></div>
          <div class="ch-stats"><span>${fmt(c.current)} / ${fmt(c.target)}</span><span>${Math.round(pct)}%</span></div>
        </div>`;
      }).join('');
    });

    function renderMilestones(list) {
      return list.map(m => {
        const earned = m.current >= m.target;
        const pct    = Math.min((m.current/m.target)*100,100);
        return `<div class="milestone ${earned?'earned':'locked'}">
          <div class="milestone-icon ${m.cls}">${m.icon}</div>
          <div class="milestone-body">
            <div class="milestone-name">${m.name}</div>
            <div class="milestone-desc">${m.desc}</div>
            <div class="milestone-progress">
              <div class="ms-bar"><div class="ms-fill" style="width:${pct}%"></div></div>
              <div class="ms-pct">${fmt(m.current)} / ${fmt(m.target)} · ${Math.round(pct)}%</div>
            </div>
          </div>
          <div class="milestone-badge">
            ${earned ? '<span class="badge-earned">✅ Done</span>' : '<span class="badge-locked">🔒 Locked</span>'}
          </div>
        </div>`;
      }).join('');
    }

    function fmt(n){return Number(n||0).toLocaleString('en-PK',{maximumFractionDigits:0});}
    window.logout=()=>signOut(auth).then(()=>window.location.href="index.html");
  </script>
</body>
</html>
